<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key System - Roblox Executor</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; text-align: center; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    button { padding: 15px 30px; font-size: 18px; margin: 15px; border: none; border-radius: 8px; cursor: pointer; }
    .btn-link { background: #ff9800; color: white; }
    .btn-generate { background: #4caf50; color: white; }
    .status { margin: 20px; padding: 15px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔑 Key System</h1>
    <p>Complete as 2 tarefas para gerar sua key</p>

    <div id="step1">
      <h2>Passo 1/2</h2>
      <button class="btn-link" onclick="startTask(1)">Fazer Primeira Tarefa</button>
    </div>

    <div id="step2" style="display:none;">
      <h2>Passo 2/2</h2>
      <button class="btn-link" onclick="startTask(2)">Fazer Segunda Tarefa</button>
    </div>

    <div id="generateSection" style="display:none;">
      <h2>Tarefas concluídas!</h2>
      <button class="btn-generate" onclick="generateKey()">Gerar Key</button>
    </div>

    <div id="keyResult" class="status" style="display:none;"></div>
  </div>

  <script src="https://publisher.linkvertise.com/cdn/linkvertise.js"></script>
  <script>
    const USER_ID = 1457339;
    let completed = {1: false, 2: false};

    function startTask(task) {
      linkvertise(USER_ID, {
        whitelist: [],
        blacklist: [""],
        callback: () => {
          completed[task] = true;
          if (task === 1) {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
          } else if (task === 2) {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('generateSection').style.display = 'block';
          }
        }
      });
    }

    async function generateKey() {
      const res = await fetch('/api/generate', { method: 'POST' });
      const data = await res.json();

      const div = document.getElementById('keyResult');
      if (data.success) {
        div.innerHTML = `
          <h2>Sua Key:</h2>
          <h3 style="color:#4caf50; word-break:break-all;">${data.key}</h3>
          <p>Expira em: ${data.expires}</p>
        `;
      } else {
        div.innerHTML = `<p style="color:red;">Erro: ${data.error}</p>`;
      }
      div.style.display = 'block';
    }
  </script>
</body>
</html>
